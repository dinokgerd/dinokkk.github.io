<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syaidin Aldino</title>
  <link rel="stylesheet" href="dinok.css">
</head>

<body>

<header>
  <h1>Dino</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </nav>
  <button id="toggle">🌙</button>
</header>

<section id="home" class="fade hero">
  <h2 id="typing"></h2>
  <p>Bingung juga weh</p>
  <button onclick="klik()">Klik Aku</button>
</section>

<section id="about" class="fade">
  <h2>About Me</h2>
  <p>Aku Dino, suka coding dan eksplorasi ide kreatif.</p>

  <div class="skills">
    <div class="skill">
      <p>HTML</p>
      <div class="bar"><div class="fill" data-width="90%"></div></div>
    </div>
    <div class="skill">
      <p>CSS</p>
      <div class="bar"><div class="fill" data-width="80%"></div></div>
    </div>
    <div class="skill">
      <p>JavaScript</p>
      <div class="bar"><div class="fill" data-width="70%"></div></div>
    </div>
  </div>
</section>

<section id="gallery" class="fade">
  <h2>Gallery</h2>
  <div class="grid">
    <img src="assets/Snapshot_20230328_14.JPG" onclick="openModal(this)">
    <img src="assets/Snapshot_20230328_56.JPG" onclick="openModal(this)">
    <img src="assets/Snapshot_20230920_6.JPG" onclick="openModal(this)">
  </div>
</section>

<div id="modal" onclick="closeModal()">
  <img id="modal-img">
</div>

<section id="contact" class="fade">
  <h2>Contact</h2>
  <form onsubmit="kirim(event)">
    <input type="text" placeholder="Nama" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Pesan"></textarea>
    <button type="submit">Kirim</button>
  </form>
</section>

<footer>
  <p>© Dino 2026</p>
</footer>

<script src="dinokk.js"></script>
</body>
</html>
